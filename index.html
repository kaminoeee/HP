    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000; color: white;
            font-family: Arial, sans-serif; overflow: hidden; height: 100vh;
        }
        #video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: contain; background-color: #000000; z-index: 0;
            display: none;
        }
        #comment-stage {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            pointer-events: none; z-index: 2;
        }
        .comment {
            position: absolute; white-space: nowrap; font-weight: bold;
            text-shadow: 2px 2px 2px #000, -2px -2px 2px #000, 2px -2px 2px #000, -2px 2px 2px #000;
            will-change: transform;
        }
        .comment.naka { animation: textScroll 5s linear forwards; }
        .comment.ue, .comment.shita { left: 50%; transform: translateX(-50%); animation: textFixed 3s linear forwards; }

        @keyframes textScroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        @keyframes textFixed { 0%, 100% { opacity: 1; } }

        #announcement-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(204, 0, 0, 0.9); color: #fff;
            text-align: center; padding: 12px 0; font-weight: bold; font-size: 18px;
            z-index: 3; display: none;
        }

        #ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 15, 15, 0.85); box-sizing: border-box; padding: 15px;
            z-index: 10; display: flex; flex-direction: column; gap: 8px;
            border-top: 1px solid #333; backdrop-filter: blur(5px);
            transform: translateY(85%); transition: transform 0.3s ease-in-out, background 0.3s;
        }
        #ui-panel:hover, #ui-panel:focus-within {
            transform: translateY(0); background: rgba(15, 15, 15, 0.98);
        }
        #ui-panel::before {
            content: "▲ マウスを合わせるとメニューが表示されます ▲";
            display: block; text-align: center; font-size: 11px; color: #888;
            margin-top: -10px; margin-bottom: 5px; pointer-events: none;
        }

        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .admin-only { display: none; background: #2a1a00; border: 1px solid #ff9900; padding: 5px; border-radius: 4px; gap: 8px; align-items: center; }
        
        input, button, select { padding: 6px 10px; font-size: 13px; border-radius: 4px; border: none; }
        input[type="text"], input[type="number"] { background: #222; color: white; border: 1px solid #444; }
        select { background: #333; color: white; border: 1px solid #555; }
        
        #comment-input { flex: 1; min-width: 200px; }
        #announcement-input { width: 180px; }
        #com-size { width: 50px; text-align: center; }
        
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #444; cursor: not-allowed; }
        #screen-btn { background: #28a745; }
        #announce-btn { background: #dc3545; }
        #announce-stop-btn { background: #6c757d; }
        
        #status-msg { font-size: 12px; color: #ff9900; font-weight: bold; }
    </style>
</head>
<body>

    <div id="announcement-bar"></div>
    <video id="video-bg" autoplay playsinline></video>
    <div id="comment-stage"></div>

    <div id="ui-panel">
        <div class="row">
            <span id="status-msg">接続を初期化中...</span>
            <span style="font-size:12px;">接続数: <span id="peer-count" style="color:#00ffcc; font-weight:bold;">0</span>人</span>

            <div id="admin-controls" class="admin-only">
                <span style="color: #ff9900; font-weight: bold; font-size:12px;">【管理】</span>
                <button id="screen-btn">画面共有を開始</button>
                <input type="text" id="announcement-input" placeholder="お知らせ内容">
                <select id="announce-mode">
                    <option value="5s">5秒で消す</option>
                    <option value="always">ずっと表示</option>
                </select>
                <button id="announce-btn">通知送信</button>
                <button id="announce-stop-btn" style="display:none;">お知らせ停止</button>
            </div>
        </div>

        <div class="row">
            <select id="com-pos">
                <option value="naka">デフォルト</option>
                <option value="ue">上部固定</option>
                <option value="shita">下部固定</option>
            </select>
            
            <select id="com-color">
                <option value="#ffffff" style="color:#fff;">白</option>
                <option value="#ff0000" style="color:#f00;">赤</option>
                <option value="#00ff00" style="color:#0f0;">緑</option>
                <option value="#00ffff" style="color:#0ff;">青緑</option>
                <option value="#ffff00" style="color:#ff0;">黄</option>
                <option value="#ff00ff" style="color:#f0f;">紫</option>
                <option value="#ff9900" style="color:#f90;">橙</option>
            </select>

            <label for="com-size">サイズ:</label>
            <input type="number" id="com-size" value="32" min="10" max="100"><span>px</span>

            <input type="text" id="comment-input" placeholder="コメントを入力してEnter" disabled>
            <button id="send-btn" disabled>送信</button>
        </div>
    </div>

    <script>
        const commentStage = document.getElementById('comment-stage');
        const videoBg = document.getElementById('video-bg');
        const announcementBar = document.getElementById('announcement-bar');
        const statusMsg = document.getElementById('status-msg');
        const peerCountDisplay = document.getElementById('peer-count');
        
        const commentInput = document.getElementById('comment-input');
        const sendBtn = document.getElementById('send-btn');
        const comPos = document.getElementById('com-pos');
        const comColor = document.getElementById('com-color');
        const comSize = document.getElementById('com-size');
        
        const adminControls = document.getElementById('admin-controls');
        const screenBtn = document.getElementById('screen-btn');
        const announcementInput = document.getElementById('announcement-input');
        const announceMode = document.getElementById('announce-mode');
        const announceBtn = document.getElementById('announce-btn');
        const announceStopBtn = document.getElementById('announce-stop-btn');

        let peer = null;
        let connections = {}; 
        let localStream = null;
        let mqttClient = null;
        let announceTimer = null;

        const ROOM_ID = "1";
        const MQTT_TOPIC = `nico-p2p-live-room-${ROOM_ID}`;

        const isAdmin = window.location.search.includes('_admin');
        if (isAdmin) adminControls.style.display = 'flex';

        window.addEventListener('DOMContentLoaded', () => { initP2P(); });

        function initP2P() {
            peer = new Peer();
            peer.on('open', (myId) => {
                statusMsg.textContent = "同期システムに接続中...";
                commentInput.disabled = false;
                sendBtn.disabled = false;

                mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                mqttClient.on('connect', () => {
                    mqttClient.subscribe(MQTT_TOPIC);
                    statusMsg.textContent = `部屋 ${ROOM_ID} に自動入室しました。`;
                    mqttClient.publish(MQTT_TOPIC, JSON.stringify({ type: 'join', id: myId }));
                });

                mqttClient.on('message', (topic, message) => {
                    const data = JSON.parse(message.toString());
                    if (data.id && data.id !== myId) {
                        if (data.type === 'join') {
                            mqttClient.publish(MQTT_TOPIC, JSON.stringify({ type: 'here', id: myId }));
                            connectToPeer(data.id);
                        } else if (data.type === 'here') {
                            connectToPeer(data.id);
                        }
                    }
                });
            });

            peer.on('connection', (conn) => { setupDataConnection(conn); });
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    videoBg.srcObject = remoteStream;
                    videoBg.style.display = 'block';
                });
            });
        }

        function connectToPeer(peerId) {
            if (connections[peerId]) return;
            const conn = peer.connect(peerId);
            setupDataConnection(conn);
        }

        function setupDataConnection(conn) {
            if (connections[conn.peer]) return;
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updatePeerCount();
                if (isAdmin && localStream) { 
                    setTimeout(() => { peer.call(conn.peer, localStream); }, 1000); 
                }
            });
            conn.on('data', (data) => {
                if (data.type === 'comment') createComment(data.text, data.pos, data.color, data.size);
                if (data.type === 'announce') showAnnouncement(data.text, data.mode);
                if (data.type === 'stream_ended') stopAndHideVideo();
                if (data.type === 'request_stream' && isAdmin && localStream) {
                    peer.call(conn.peer, localStream);
                }
            });
            conn.on('close', () => { delete connections[conn.peer]; updatePeerCount(); });
            conn.on('error', () => { delete connections[conn.peer]; updatePeerCount(); });
        }

        function updatePeerCount() { peerCountDisplay.textContent = Object.keys(connections).length; }
        function stopAndHideVideo() { videoBg.style.display = 'none'; if (videoBg.srcObject) videoBg.srcObject = null; }

        function createComment(text, pos, color, size) {
            const commentElem = document.createElement('div');
            commentElem.classList.add('comment', pos);
            commentElem.textContent = text;
            
            const checkedSize = Math.min(Math.max(parseInt(size) || 32, 10), 100);
            commentElem.style.color = color;
            commentElem.style.fontSize = `${checkedSize}px`;

            if (pos === 'naka') {
                const randomTop = Math.floor(Math.random() * 75) + 8;
                commentElem.style.top = `${randomTop}%`;
            } else if (pos === 'ue') {
                commentElem.style.top = '10%';
            } else if (pos === 'shita') {
                commentElem.style.bottom = '15%';
            }

            commentStage.appendChild(commentElem);
            commentElem.addEventListener('animationend', () => commentElem.remove());
        }

        function showAnnouncement(text, mode) {
            if (announceTimer) clearTimeout(announceTimer);
            if (!text) { announcementBar.style.display = 'none'; return; }
            announcementBar.textContent = text;
            announcementBar.style.display = 'block';
            if (mode === '5s') { announceTimer = setTimeout(() => { announcementBar.style.display = 'none'; }, 5000); }
        }

        function broadcastData(data) {
            Object.values(connections).forEach(conn => { if (conn.open) conn.send(data); });
        }

        function sendComment() {
            const text = commentInput.value.trim();
            if (!text) return;
            let sizeVal = parseInt(comSize.value) || 32;
            if (sizeVal > 100) { sizeVal = 100; comSize.value = 100; }
            if (sizeVal < 10) { sizeVal = 10; comSize.value = 10; }
            const posVal = comPos.value;
            const colorVal = comColor.value;

            createComment(text, posVal, colorVal, sizeVal);
            broadcastData({ type: 'comment', text: text, pos: posVal, color: colorVal, size: sizeVal });
            commentInput.value = '';
        }

        function stopScreenShare() {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            stopAndHideVideo();
            localStream = null;
            screenBtn.textContent = "画面共有を開始";
            screenBtn.style.background = "#28a745";
            broadcastData({ type: 'stream_ended' });
        }

        // 【高画質 ＆ 極低遅延化のコア処理】
        screenBtn.addEventListener('click', async () => {
            if (localStream) { stopScreenShare(); return; }
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        width: { ideal: 1920, max: 1920 },
                        height: { ideal: 1080, max: 1080 },
                        frameRate: { ideal: 60, max: 60 },
                        displaySurface: "monitor",
                        // 👇 ぼやけを消し、くっきりした最高画質にする
                        contentHint: "detail" 
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false, 
                        autoGainControl: false,
                        // 👇 音声の遅延を限界まで削る
                        latency: 0.005 
                    }
                });

                // 👇 映像トラックの遅延・バッファをゼロにする設定
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack && typeof videoTrack.applyConstraints === 'function') {
                    videoTrack.applyConstraints({
                        latency: 0,
                        realtimeVideo: true
                    }).catch(e => console.log("Constraints extension skipped:", e));
                }
                
                videoBg.srcObject = localStream;
                videoBg.muted = true; 
                videoBg.style.display = 'block'; 
                
                screenBtn.textContent = "共有を停止";
                screenBtn.style.background = "#dc3545";

                Object.keys(connections).forEach(peerId => { 
                    peer.call(peerId, localStream); 
                });
                broadcastData({ type: 'request_stream' });

                localStream.getVideoTracks()[0].addEventListener('ended', () => { stopScreenShare(); });
            } catch (err) { console.error("画面共有エラー:", err); }
        });

        announceBtn.addEventListener('click', () => {
            const text = announcementInput.value.trim();
            const mode = announceMode.value;
            showAnnouncement(text, mode);
            broadcastData({ type: 'announce', text: text, mode: mode });
            if (mode === 'always' && text) { announceStopBtn.style.display = 'inline-block'; } 
            else { announceStopBtn.style.display = 'none'; }
        });

        announceStopBtn.addEventListener('click', () => {
            showAnnouncement('', '5s');
            broadcastData({ type: 'announce', text: '', mode: '5s' });
            announceStopBtn.style.display = 'none';
            announcementInput.value = '';
        });

        sendBtn.addEventListener('click', sendComment);
        commentInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) sendComment(); });
    </script>
</body>
</html>
